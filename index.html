<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haven - Digital Sanctuary</title>
    
    <!-- Load Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Load React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Load Babel to compile JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Custom CSS Animations & Scrollbar -->
    <style>
      @keyframes breathe {
        0%, 100% { transform: scale(1); opacity: 0.3; }
        50% { transform: scale(1.8); opacity: 0.6; }
      }
      .animate-breathe {
        animation: breathe 8s infinite ease-in-out;
      }
      
      @keyframes shred {
        0% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        50% { opacity: 0.5; transform: translateY(20px) scale(0.95); filter: blur(5px); }
        100% { opacity: 0; transform: translateY(50px) scale(0.9); filter: blur(15px); }
      }
      .animate-shred {
        animation: shred 1.5s forwards ease-out;
      }

      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 10px; }
      
      body {
          -webkit-tap-highlight-color: transparent;
      }
    </style>
</head>
<body class="bg-[#F9F6F0] text-[#3F3E3A] font-sans selection:bg-[#E3E8E1] selection:text-[#2D5A27]">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Custom SVG Icon Components (Replaces external dependencies)
        const IconHome = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        );
        const IconUsers = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        );
        const IconWind = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2"/><path d="M9.6 4.6A2 2 0 1 1 11 8H2"/><path d="M12.6 19.4A2 2 0 1 0 14 16H2"/></svg>
        );
        const IconBookOpen = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        );
        const IconTrash2 = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
        );
        const IconHeart = ({ className, filled }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill={filled ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
        );
        const IconShield = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2-1 4-2 7-2 2.5 0 4.5 1 6.5 2a1 1 0 0 1 1 1z"/></svg>
        );
        const IconCheckCircle = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>
        );

        const INITIAL_POSTS = [
          {
            id: 1,
            author: "QuietPanda42",
            time: "2 hours ago",
            tag: "Academic Burnout",
            content: "I have 3 tests tomorrow and I'm just sitting here staring at the wall. I feel like if I don't get straight A's my entire future is ruined.",
            meTooCount: 45,
            hasMeTooced: false
          },
          {
            id: 2,
            author: "GentleFern19",
            time: "5 hours ago",
            tag: "Eco-Anxiety",
            content: "Does anyone else feel completely overwhelmed every time they look at the news? It feels like the world is on fire and nobody in charge cares.",
            meTooCount: 112,
            hasMeTooced: false
          },
          {
            id: 3,
            author: "WanderingCloud",
            time: "8 hours ago",
            tag: "Venting",
            content: "Got left out of another group chat today. It's so exhausting pretending I don't care at school.",
            meTooCount: 89,
            hasMeTooced: false
          }
        ];

        const DailyReset = () => {
          const [tasksCompleted, setTasksCompleted] = useState({
            habit: false,
            news: false,
            prompt: false
          });

          const allDone = tasksCompleted.habit && tasksCompleted.news && tasksCompleted.prompt;

          return (
            <div className="space-y-6 pb-20 opacity-0 transition-opacity duration-500 ease-in" style={{ opacity: 1 }}>
              <div className="text-center space-y-2 mb-8">
                <h1 className="text-2xl font-semibold text-[#2D5A27]">Your Daily Reset</h1>
                <p className="text-[#5A5852]">Three things. No infinite scroll.</p>
              </div>

              {/* Micro-Habit Card */}
              <div className={`p-6 rounded-2xl transition-all duration-300 border border-[#E3E8E1] ${tasksCompleted.habit ? 'bg-white/50 opacity-60' : 'bg-white shadow-sm'}`}>
                <div className="flex justify-between items-start mb-4">
                  <span className="text-xs font-bold uppercase tracking-wider text-[#2D5A27] bg-[#E3E8E1] px-3 py-1 rounded-full">1. Micro-Habit</span>
                  <button onClick={() => setTasksCompleted(prev => ({...prev, habit: !prev.habit}))}>
                    <IconCheckCircle className={`w-6 h-6 ${tasksCompleted.habit ? 'text-[#2D5A27]' : 'text-gray-300'}`} />
                  </button>
                </div>
                <h3 className="text-xl text-[#3F3E3A] font-medium mb-2">The 20-20-20 Rule</h3>
                <p className="text-[#5A5852]">Look away from your screen at something 20 feet away for 20 seconds. It resets your nervous system and eye strain.</p>
              </div>

              {/* Good News Card */}
              <div className={`p-6 rounded-2xl transition-all duration-300 border border-[#E3E8E1] ${tasksCompleted.news ? 'bg-white/50 opacity-60' : 'bg-[#F2F6F0] shadow-sm'}`}>
                 <div className="flex justify-between items-start mb-4">
                  <span className="text-xs font-bold uppercase tracking-wider text-[#2D5A27] bg-[#E3E8E1] px-3 py-1 rounded-full">2. Good News</span>
                  <button onClick={() => setTasksCompleted(prev => ({...prev, news: !prev.news}))}>
                    <IconCheckCircle className={`w-6 h-6 ${tasksCompleted.news ? 'text-[#2D5A27]' : 'text-gray-300'}`} />
                  </button>
                </div>
                <h3 className="text-xl text-[#3F3E3A] font-medium mb-2">Ocean Cleanup Milestone</h3>
                <p className="text-[#5A5852]">Scientists report that the largest ocean cleanup project has successfully removed 100,000kg of plastic from the Pacific this week.</p>
              </div>

              {/* Daily Prompt Card */}
              <div className={`p-6 rounded-2xl transition-all duration-300 border border-[#E3E8E1] ${tasksCompleted.prompt ? 'bg-white/50 opacity-60' : 'bg-white shadow-sm'}`}>
                 <div className="flex justify-between items-start mb-4">
                  <span className="text-xs font-bold uppercase tracking-wider text-[#2D5A27] bg-[#E3E8E1] px-3 py-1 rounded-full">3. Daily Prompt</span>
                  <button onClick={() => setTasksCompleted(prev => ({...prev, prompt: !prev.prompt}))}>
                    <IconCheckCircle className={`w-6 h-6 ${tasksCompleted.prompt ? 'text-[#2D5A27]' : 'text-gray-300'}`} />
                  </button>
                </div>
                <h3 className="text-xl text-[#3F3E3A] font-medium mb-4">What is one tiny thing that went right today?</h3>
                <textarea 
                  placeholder="Jot down your thought..." 
                  className="w-full bg-[#F9F6F0] border-none rounded-xl p-4 text-[#3F3E3A] focus:ring-2 focus:ring-[#E3E8E1] outline-none resize-none"
                  rows="2"
                ></textarea>
              </div>

              {allDone && (
                <div className="text-center py-8 transform transition-all duration-700 translate-y-0 opacity-100">
                  <p className="text-[#2D5A27] font-medium">You're all caught up for today.</p>
                  <p className="text-sm text-[#5A5852] mt-2">Take a breath, and feel free to close the app.</p>
                </div>
              )}
            </div>
          );
        };

        const CommonRoom = () => {
          const [posts, setPosts] = useState(INITIAL_POSTS);

          const toggleMeToo = (id) => {
            setPosts(posts.map(post => {
              if (post.id === id) {
                return {
                  ...post,
                  meTooCount: post.hasMeTooced ? post.meTooCount - 1 : post.meTooCount + 1,
                  hasMeTooced: !post.hasMeTooced
                };
              }
              return post;
            }));
          };

          return (
            <div className="space-y-6 pb-20 opacity-0 transition-opacity duration-500 ease-in" style={{ opacity: 1 }}>
              <div className="flex justify-between items-center mb-6">
                <div>
                  <h1 className="text-2xl font-semibold text-[#2D5A27]">Common Room</h1>
                  <p className="text-[#5A5852] text-sm">You are posting as <span className="font-semibold bg-[#E3E8E1] px-2 py-1 rounded">SilverFox8</span></p>
                </div>
                <IconShield className="text-[#2D5A27] w-6 h-6 opacity-50" />
              </div>

              {/* New Post Input */}
              <div className="bg-white p-4 rounded-2xl border border-[#E3E8E1] shadow-sm mb-8">
                <textarea 
                  placeholder="Share what's on your mind. You are anonymous and safe here." 
                  className="w-full bg-transparent border-none text-[#3F3E3A] focus:ring-0 outline-none resize-none placeholder:text-gray-400"
                  rows="3"
                ></textarea>
                <div className="flex justify-between items-center mt-3 pt-3 border-t border-[#F0F2EE]">
                  <select className="bg-[#F9F6F0] text-sm text-[#5A5852] border-none rounded-lg p-2 outline-none">
                    <option>Select Tag...</option>
                    <option>Academic Burnout</option>
                    <option>Anxiety</option>
                    <option>Venting</option>
                    <option>Success Story</option>
                  </select>
                  <button className="bg-[#2D5A27] text-white px-5 py-2 rounded-xl text-sm font-medium hover:bg-[#22451f] transition-colors">
                    Post Anonymously
                  </button>
                </div>
              </div>

              {/* Posts Feed */}
              <div className="space-y-4">
                {posts.map(post => (
                  <div key={post.id} className="bg-white p-5 rounded-2xl border border-[#E3E8E1] shadow-sm">
                    <div className="flex justify-between items-center mb-3">
                      <div className="flex items-center space-x-2">
                        <div className="w-8 h-8 rounded-full bg-[#E3E8E1] flex items-center justify-center text-[#2D5A27] font-bold text-xs">
                          {post.author.charAt(0)}
                        </div>
                        <div>
                          <p className="text-sm font-medium text-[#3F3E3A]">{post.author}</p>
                          <p className="text-xs text-[#8A8882]">{post.time}</p>
                        </div>
                      </div>
                      <span className="text-xs font-medium text-[#5A5852] bg-[#F9F6F0] px-2 py-1 rounded-md">
                        {post.tag}
                      </span>
                    </div>
                    
                    <p className="text-[#3F3E3A] leading-relaxed mb-4">{post.content}</p>
                    
                    <div className="flex items-center">
                      <button 
                        onClick={() => toggleMeToo(post.id)}
                        className={`flex items-center space-x-2 px-4 py-2 rounded-xl text-sm transition-all ${
                          post.hasMeTooced 
                            ? 'bg-[#E3E8E1] text-[#2D5A27] font-medium' 
                            : 'bg-[#F9F6F0] text-[#5A5852] hover:bg-[#E3E8E1]'
                        }`}
                      >
                        <IconHeart filled={post.hasMeTooced} className={`w-4 h-4 ${post.hasMeTooced ? 'text-[#2D5A27]' : ''}`} />
                        <span>Me Too</span>
                        <span className="ml-2 bg-white/50 px-2 py-0.5 rounded-md text-xs">{post.meTooCount}</span>
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          );
        };

        const MindGym = () => {
          const [journalText, setJournalText] = useState("");
          const [isShredding, setIsShredding] = useState(false);
          const [isBreathing, setIsBreathing] = useState(false);

          const handleShred = () => {
            if (!journalText) return;
            setIsShredding(true);
            setTimeout(() => {
              setJournalText("");
              setIsShredding(false);
            }, 1500); // Wait for animation to finish
          };

          return (
            <div className="space-y-8 pb-20 opacity-0 transition-opacity duration-500 ease-in" style={{ opacity: 1 }}>
              <div className="text-center space-y-2 mb-8">
                <h1 className="text-2xl font-semibold text-[#2D5A27]">Mind Gym</h1>
                <p className="text-[#5A5852]">Tools to regulate your nervous system.</p>
              </div>

              {/* Breathing Tool */}
              <div className="bg-[#E3E8E1]/40 rounded-3xl p-8 flex flex-col items-center justify-center min-h-[300px] border border-[#E3E8E1]">
                <div className="relative w-40 h-40 flex items-center justify-center mb-8">
                  {/* Animated Circle */}
                  <div className={`absolute w-full h-full rounded-full bg-[#8CA887] transition-all duration-700 ${isBreathing ? 'animate-breathe' : 'opacity-20 scale-100'}`}></div>
                  <div className="absolute w-24 h-24 rounded-full bg-[#2D5A27] flex items-center justify-center z-10 shadow-lg">
                     <IconWind className="text-white w-8 h-8" />
                  </div>
                </div>
                
                <p className="text-[#3F3E3A] font-medium text-lg mb-6 h-6 text-center">
                  {isBreathing ? "Breathe in... Breathe out..." : "Box Breathing Tool"}
                </p>
                
                <button 
                  onClick={() => setIsBreathing(!isBreathing)}
                  className="bg-white text-[#2D5A27] border border-[#2D5A27] px-8 py-3 rounded-full font-medium hover:bg-[#2D5A27] hover:text-white transition-colors"
                >
                  {isBreathing ? "Stop" : "Start Exercise"}
                </button>
              </div>

              {/* Brain Dump & Shredder */}
              <div className="bg-white p-6 rounded-3xl border border-[#E3E8E1] shadow-sm">
                <div className="flex items-center space-x-2 mb-4">
                  <IconBookOpen className="text-[#2D5A27] w-5 h-5" />
                  <h3 className="text-xl font-medium text-[#3F3E3A]">The Brain Dump</h3>
                </div>
                <p className="text-sm text-[#5A5852] mb-4">
                  Type out whatever is causing you stress right now. This is not saved anywhere. When you are ready, destroy it.
                </p>
                
                <div className="relative">
                  <textarea
                    value={journalText}
                    onChange={(e) => setJournalText(e.target.value)}
                    disabled={isShredding}
                    placeholder="I am feeling overwhelmed because..."
                    className={`w-full bg-[#F9F6F0] rounded-xl p-4 text-[#3F3E3A] min-h-[150px] focus:ring-2 focus:ring-[#E3E8E1] outline-none resize-none transition-all ${isShredding ? 'animate-shred' : ''}`}
                  ></textarea>
                  
                  <div className="mt-4 flex justify-end">
                    <button 
                      onClick={handleShred}
                      disabled={!journalText || isShredding}
                      className={`flex items-center space-x-2 px-6 py-3 rounded-xl font-medium transition-all ${
                        journalText && !isShredding
                          ? 'bg-red-50 text-red-600 hover:bg-red-100 border border-red-200' 
                          : 'bg-gray-100 text-gray-400 cursor-not-allowed'
                      }`}
                    >
                      <IconTrash2 className="w-4 h-4" />
                      <span>Shred It</span>
                    </button>
                  </div>
                </div>
              </div>
            </div>
          );
        };

        const HavenApp = () => {
          const [activeTab, setActiveTab] = useState('reset');

          return (
            <div className="min-h-screen">
              {/* Top Header */}
              <header className="fixed top-0 w-full bg-[#F9F6F0]/80 backdrop-blur-md z-40 border-b border-[#E3E8E1]">
                <div className="max-w-md mx-auto px-6 py-4 flex items-center justify-center">
                  <h1 className="text-xl font-bold tracking-widest text-[#2D5A27] uppercase">Haven.</h1>
                </div>
              </header>

              {/* Main Content Area */}
              <main className="max-w-md mx-auto px-4 pt-24 min-h-screen">
                {activeTab === 'reset' && <DailyReset />}
                {activeTab === 'room' && <CommonRoom />}
                {activeTab === 'gym' && <MindGym />}
              </main>

              {/* Bottom Navigation */}
              <nav className="fixed bottom-0 w-full bg-white border-t border-[#E3E8E1] pb-safe z-50">
                <div className="max-w-md mx-auto px-6 py-3 flex justify-between items-center">
                  
                  <button 
                    onClick={() => setActiveTab('room')}
                    className={`flex flex-col items-center space-y-1 w-16 p-2 rounded-xl transition-colors ${activeTab === 'room' ? 'text-[#2D5A27]' : 'text-gray-400 hover:bg-[#F9F6F0]'}`}
                  >
                    <IconUsers className="w-6 h-6" />
                    <span className="text-[10px] font-medium">Room</span>
                  </button>

                  <button 
                    onClick={() => setActiveTab('reset')}
                    className={`flex flex-col items-center space-y-1 w-16 p-2 rounded-xl transition-colors ${activeTab === 'reset' ? 'text-[#2D5A27]' : 'text-gray-400 hover:bg-[#F9F6F0]'}`}
                  >
                    <IconHome className="w-6 h-6" />
                    <span className="text-[10px] font-medium">Reset</span>
                  </button>

                  <button 
                    onClick={() => setActiveTab('gym')}
                    className={`flex flex-col items-center space-y-1 w-16 p-2 rounded-xl transition-colors ${activeTab === 'gym' ? 'text-[#2D5A27]' : 'text-gray-400 hover:bg-[#F9F6F0]'}`}
                  >
                    <IconWind className="w-6 h-6" />
                    <span className="text-[10px] font-medium">Mind Gym</span>
                  </button>

                </div>
              </nav>
            </div>
          );
        };

        // Render the Application
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<HavenApp />);
    </script>
</body>
</html>
